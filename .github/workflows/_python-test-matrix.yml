name: Reusable - Python Test Matrix

on:
  workflow_call:
    inputs:
      python_versions:
        description: JSON array of Python versions, e.g. '["3.11","3.12"]'
        required: false
        type: string
        default: '["3.11","3.12"]'
      requirements_file:
        required: false
        type: string
        default: requirements.txt
      test_dir:
        required: false
        type: string
        default: tests
      coverage:
        required: false
        type: boolean
        default: false
      runs_on:
        required: false
        type: string
        default: ubuntu-latest
      extra_install:
        description: Extra pip install args (e.g. an editable install)
        required: false
        type: string
        default: ''

jobs:
  pytest:
    runs-on: ${{ inputs.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python_versions) }}
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f "${{ inputs.requirements_file }}" ]; then pip install -r "${{ inputs.requirements_file }}"; fi
          pip install pytest pytest-cov
          if [ -n "${{ inputs.extra_install }}" ]; then pip install ${{ inputs.extra_install }}; fi
      - name: Run pytest
        shell: bash
        run: |
          ARGS="-v --tb=short --basetemp=$RUNNER_TEMP/pytest-${{ matrix.python-version }}"
          if [ "${{ inputs.coverage }}" = "true" ]; then ARGS="$ARGS --cov=. --cov-report=xml"; fi
          pytest ${{ inputs.test_dir }} $ARGS
      - name: Upload coverage
        if: ${{ inputs.coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
