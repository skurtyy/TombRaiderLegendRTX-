name: Reusable - Handoff File Staleness Watchdog

on:
  workflow_call:
    inputs:
      watched_files:
        description: JSON array of files to check
        required: false
        type: string
        default: '["CLAUDE.md","HANDOFF.md","WHITEBOARD.md","FLEET.md"]'
      max_age_days:
        required: false
        type: number
        default: 14
    secrets:
      LINEAR_API_KEY:
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect stale handoff files
        env:
          WATCHED_FILES: ${{ inputs.watched_files }}
          MAX_AGE_DAYS: ${{ inputs.max_age_days }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PYEOF'
          import json, os, subprocess, urllib.request
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          watched = json.loads(os.environ['WATCHED_FILES'])
          max_age = int(os.environ['MAX_AGE_DAYS'])
          cutoff = datetime.now(timezone.utc) - timedelta(days=max_age)

          # Repo activity: last commit overall
          last_commit_str = subprocess.check_output(['git','log','-1','--format=%cI']).decode().strip()
          last_commit = datetime.fromisoformat(last_commit_str.replace('Z','+00:00'))
          repo_active = last_commit > cutoff

          stale = []
          for f in watched:
              if not Path(f).exists():
                  continue
              try:
                  ts = subprocess.check_output(['git','log','-1','--format=%cI','--', f]).decode().strip()
                  if not ts: continue
                  modified = datetime.fromisoformat(ts.replace('Z','+00:00'))
                  if modified < cutoff:
                      stale.append((f, modified.date().isoformat()))
              except subprocess.CalledProcessError:
                  pass

          if not stale or not repo_active:
              print('No stale handoff files (or repo itself is quiet)')
              raise SystemExit(0)

          msg = '\n'.join(f'- `{f}` last touched {d}' for f, d in stale)
          title = f'[staleness] Handoff files outdated in {os.environ["REPO"]}'
          desc = f'These handoff files have not been touched in over {max_age} days while the repo has had recent commits:\n\n{msg}\n\nUpdate them to keep Claude context aligned with code.'
          print(title)
          print(desc)

          key = os.environ.get('LINEAR_API_KEY','')
          if not key:
              print('LINEAR_API_KEY not configured, only logged')
              raise SystemExit(0)
          cfg = json.loads(Path('linear/config.json').read_text()) if Path('linear/config.json').exists() else {}
          if not cfg.get('teamId'):
              print('linear/config.json missing or no teamId, only logged')
              raise SystemExit(0)
          q = '''mutation($t:String!,$p:String,$ti:String!,$d:String!){issueCreate(input:{teamId:$t,projectId:$p,title:$ti,description:$d}){success}}'''
          payload = json.dumps({'query':q,'variables':{'t':cfg['teamId'],'p':cfg.get('projectId'),'ti':title,'d':desc}}).encode()
          r = urllib.request.Request('https://api.linear.app/graphql', data=payload, headers={'Content-Type':'application/json','Authorization':key})
          urllib.request.urlopen(r).read()
          print('Linear issue created')
          PYEOF
