name: Idea Generation

on:
  schedule:
    - cron: '0 9 * * 3'   # Every Wednesday 09:00 UTC
  workflow_dispatch:

jobs:
  generate-ideas:
    runs-on: ubuntu-latest
    if: vars.LINEAR_ENABLED == 'true'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build context
        id: context
        run: |
          python - <<'EOF'
          import json
          from linear.parse_changelog import last_n_entries, format_for_context
          from pathlib import Path

          claude_md = Path("CLAUDE.md").read_text(encoding="utf-8") if Path("CLAUDE.md").exists() else ""
          whiteboard = Path("WHITEBOARD.md").read_text(encoding="utf-8") if Path("WHITEBOARD.md").exists() else ""
          changelog_context = format_for_context(last_n_entries(20))

          context = f"""# Project: TombRaiderLegendRTX

## CLAUDE.md
{claude_md[:3000]}

## WHITEBOARD (current hypotheses and blockers)
{whiteboard[:2000]}

## Last 20 CHANGELOG entries
{changelog_context}
"""
          Path("/tmp/context.txt").write_text(context, encoding="utf-8")
          print("Context built.")
          EOF

      - name: Call Claude API for ideas
        id: ideas
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'EOF'
          import json, urllib.request, os
          from pathlib import Path

          context = Path("/tmp/context.txt").read_text(encoding="utf-8")

          prompt = f"""{context}

---

Given the current project state above, identify the 3–5 most promising **unexplored or under-explored** approaches that could resolve the active blocker or advance the project.

For each idea:
1. State the hypothesis clearly (1–2 sentences)
2. Explain why it's likely to help given the current evidence
3. Describe the concrete first step to test it

Format as a numbered list. Be specific to TombRaiderLegendRTX's codebase and blockers — avoid generic suggestions."""

          payload = {
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 1000,
              "messages": [{"role": "user", "content": prompt}]
          }
          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01"
              }
          )
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
          ideas_text = data["content"][0]["text"]
          Path("/tmp/ideas.txt").write_text(ideas_text, encoding="utf-8")
          print(ideas_text)
          EOF

      - name: Push ideas to Linear
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          python - <<'EOF'
          import json, urllib.request, os, re
          from pathlib import Path

          API_KEY = os.environ["LINEAR_API_KEY"]
          API_URL = "https://api.linear.app/graphql"
          ideas_text = Path("/tmp/ideas.txt").read_text(encoding="utf-8")

          config = json.loads(Path("linear/config.json").read_text())
          team_id = config["teamId"]
          project_id = config["projectId"]
          auto_idea_label = config["labelIds"].get("auto-idea")

          # Split ideas by numbered list
          ideas = re.split(r"\n(?=\d+\.)", ideas_text.strip())

          def gql(query, variables=None):
              payload = json.dumps({"query": query, "variables": variables or {}}).encode()
              req = urllib.request.Request(API_URL, data=payload,
                  headers={"Content-Type": "application/json", "Authorization": API_KEY})
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          for idea in ideas:
              if not idea.strip():
                  continue
              lines = idea.strip().splitlines()
              title = lines[0].lstrip("0123456789. ").strip()[:200]
              body = "\n".join(lines[1:]).strip()
              gql("""mutation($teamId: String!, $projectId: String!, $title: String!, $description: String!, $labelIds: [String!]) {
                  issueCreate(input: {teamId: $teamId, projectId: $projectId, title: $title, description: $description, labelIds: $labelIds}) {
                      success
                  }
              }""", {
                  "teamId": team_id,
                  "projectId": project_id,
                  "title": f"[auto-idea] {title}",
                  "description": body,
                  "labelIds": [auto_idea_label] if auto_idea_label else []
              })
              print(f"Created Linear issue: {title}")
          EOF

      - name: Append ideas to WHITEBOARD.md and open PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="bot/ideas-${DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          IDEAS=$(cat /tmp/ideas.txt)
          cat >> WHITEBOARD.md << MARKDOWN

          ## Auto-Generated Ideas — ${DATE}

          ${IDEAS}
          MARKDOWN

          git add WHITEBOARD.md
          git commit -m "bot: auto-generated ideas ${DATE}"
          git push origin "$BRANCH"

          gh pr create \
            --title "Auto-ideas ${DATE}" \
            --body "Auto-generated by idea-generation.yml. Review and merge or close." \
            --base main \
            --head "$BRANCH" \
            --draft
