name: Changelog Check

on:
  pull_request:
    branches: [main]

jobs:
  changelog:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check CHANGELOG updated
        run: |
          if git diff --name-only origin/main...HEAD | grep -q 'CHANGELOG'; then
            echo "CHANGELOG.md updated — good."
          else
            echo "::warning::CHANGELOG.md not updated in this PR. Please document your changes with a dated entry."
          fi
