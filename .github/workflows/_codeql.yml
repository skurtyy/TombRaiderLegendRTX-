name: Reusable - CodeQL

on:
  workflow_call:
    inputs:
      languages:
        description: JSON array of CodeQL languages, e.g. '["python"]' or '["python","cpp"]'
        required: false
        type: string
        default: '["python"]'

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ${{ matrix.language == 'cpp' && 'windows-latest' || 'ubuntu-latest' }}
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages) }}
    steps:
      - uses: actions/checkout@v4
      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        if: matrix.language == 'cpp'
        uses: github/codeql-action/autobuild@v3
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
