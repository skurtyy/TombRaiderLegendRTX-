name: Reusable - CodeQL

on:
  workflow_call:
    inputs:
      languages:
        description: JSON array of CodeQL languages, e.g. '["python"]' or '["python","cpp"]'
        required: false
        type: string
        default: '["python"]'
      build_mode:
        description: 'autobuild | manual | none (cpp requires autobuild or manual)'
        required: false
        type: string
        default: none

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ${{ matrix.language == 'cpp' && 'windows-latest' || 'ubuntu-latest' }}
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages) }}
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Init CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # build-mode removed
      - name: Autobuild
        if: matrix.language == 'cpp'
        uses: github/codeql-action/autobuild@v4
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
