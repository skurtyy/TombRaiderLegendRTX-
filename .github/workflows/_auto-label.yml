name: Reusable - Auto Label Sync

on:
  workflow_call:
    inputs:
      automerge_label:
        required: false
        type: string
        default: automerge
    secrets:
      BOT_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Create or Update Labels
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e
          create_or_update() {
            local name="$1"
            local color="$2"
            local desc="$3"
            gh label create "$name" --color "$color" --description "$desc" --force --repo "${{ github.repository }}" || true
          }
          create_or_update "${{ inputs.automerge_label }}" "0E8A16" "Auto-merge this PR"
          create_or_update "dependencies" "C2E0C6" "Dependency updates"
          create_or_update "cursor" "1D76DB" "Changes from Cursor agent"
          create_or_update "claude-review" "5319E7" "Request a Claude code review"
          create_or_update "auto-idea" "FBCA04" "Auto-generated idea from Claude"
          create_or_update "upstream" "B60205" "Upstream dependency change"
          create_or_update "risk-low" "C2E0C6" "Low risk change (auto-assessed)"
          create_or_update "risk-med" "FBCA04" "Medium risk change (auto-assessed)"
          create_or_update "risk-high" "B60205" "High risk change (auto-assessed)"

  label:
    needs: sync-labels
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Label Dependabot
        if: ${{ github.actor == 'dependabot[bot]' }}
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          labels: ${{ inputs.automerge_label }}, dependencies
      - name: Label Cursor branches
        if: ${{ startsWith(github.head_ref || '', 'cursor/') }}
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          labels: ${{ inputs.automerge_label }}, cursor
      - name: Label Claude branches
        if: ${{ startsWith(github.head_ref || '', 'claude/') }}
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          labels: ${{ inputs.automerge_label }}
