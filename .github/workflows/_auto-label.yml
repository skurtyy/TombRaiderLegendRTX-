name: Reusable - Auto Label Sync

on:
  workflow_call:
    inputs:
      automerge_label:
        required: false
        type: string
        default: automerge
    secrets:
      BOT_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Create or update labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const labels = [
              { name: '${{ inputs.automerge_label }}', color: '0E8A16', description: 'Auto-merge this PR' },
              { name: 'dependencies', color: 'C2E0C6', description: 'Dependency updates' },
              { name: 'cursor', color: '1D76DB', description: 'Changes from Cursor agent' },
              { name: 'claude-review', color: '5319E7', description: 'Request a Claude code review' },
              { name: 'auto-idea', color: 'F8CA04', description: 'Auto-generated idea from Claude' },
              { name: 'upstream', color: 'B60205', description: 'Upstream dependency change' },
              { name: 'risk-low', color: 'C2E0C6', description: 'Low risk change (auto-assessed)' },
              { name: 'risk-med', color: 'F8CA04', description: 'Medium risk change (auto-assessed)' },
              { name: 'risk-high', color: 'B60205', description: 'High risk change (auto-assessed)' }
            ];

            for (const label of labels) {
              try {
                // Try to get the label first
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
                
                // If it exists, update it with correct colors/descriptions
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                console.log(`Updated label: ${label.name}`);
              } catch (error) {
                // If the label doesn't exist (returns 404), create it
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                  console.log(`Created label: ${label.name}`);
                } else {
                  throw error; // Throw other unexpected errors
                }
              }
            }
