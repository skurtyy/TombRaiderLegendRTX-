name: Reusable - Auto Label Sync

on:
  workflow_call:
    inputs:
      automerge_label:
        required: false
        type: string
        default: automerge
    secrets:
      BOT_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - name: Sync Labels
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh label create ${{ inputs.automerge_label }} --color 0E8A16 --description "Auto-merge this PR" --force
          gh label create dependencies --color C2E0C6 --description "Dependency updates" --force
          gh label create cursor --color 1D76DB --description "Changes from Cursor agent" --force
          gh label create claude-review --color 5319E7 --description "Request a Claude code review" --force
          gh label create auto-idea --color FBCA04 --description "Auto-generated idea from Claude" --force
          gh label create upstream --color B60205 --description "Upstream dependency change" --force
          gh label create risk-low --color C2E0C6 --description "Low risk change (auto-assessed)" --force
          gh label create risk-med --color FBCA04 --description "Medium risk change (auto-assessed)" --force
          gh label create risk-high --color B60205 --description "High risk change (auto-assessed)" --force

  label:
    needs: sync-labels
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Label Dependabot
        if: ${{ github.actor == 'dependabot[bot]' }}
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          labels: ${{ inputs.automerge_label }}, dependencies
      - name: Label Cursor branches
        if: ${{ startsWith(github.head_ref || '', 'cursor/') }}
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          labels: ${{ inputs.automerge_label }}, cursor
      - name: Label Claude branches
        if: ${{ startsWith(github.head_ref || '', 'claude/') }}
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          labels: ${{ inputs.automerge_label }}
