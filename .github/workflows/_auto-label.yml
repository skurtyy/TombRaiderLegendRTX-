name: Reusable - Auto Label Sync

on:
  workflow_call:
    inputs:
      automerge_label:
        required: false
        type: string
        default: automerge
    secrets:
      BOT_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Create or update labels
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          labels=(
            "${{ inputs.automerge_label }}|0E8A16|Auto-merge this PR"
            "dependencies|C2E0C6|Dependency updates"
            "cursor|1D76DB|Changes from Cursor agent"
            "claude-review|5319E7|Request a Claude code review"
            "auto-idea|FBCA04|Auto-generated idea from Claude"
            "upstream|B60205|Upstream dependency change"
            "risk-low|C2E0C6|Low risk change (auto-assessed)"
            "risk-med|FBCA04|Medium risk change (auto-assessed)"
            "risk-high|B60205|High risk change (auto-assessed)"
          )
          for label_info in "${labels[@]}"; do
            name="${label_info%%|*}"
            rest="${label_info#*|}"
            color="${rest%%|*}"
            description="${rest#*|}"
            gh label create "$name" --color "$color" --description "$description" --force || true
          done

  label:
    needs: sync-labels
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Label Dependabot
        if: ${{ github.actor == 'dependabot[bot]' }}
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          labels: ${{ inputs.automerge_label }}, dependencies
      - name: Label Cursor branches
        if: ${{ startsWith(github.head_ref || '', 'cursor/') }}
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          labels: ${{ inputs.automerge_label }}, cursor
      - name: Label Claude branches
        if: ${{ startsWith(github.head_ref || '', 'claude/') }}
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          labels: ${{ inputs.automerge_label }}
