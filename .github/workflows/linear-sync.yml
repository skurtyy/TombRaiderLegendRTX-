name: Linear Sync

on:
  push:
    branches: [main]
    paths:
      - CHANGELOG.md
      - WHITEBOARD.md
      - 'docs/**'
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 09:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode'
        default: sync
        type: choice
        options: [sync, status, research]

jobs:
  linear-sync:
    runs-on: ubuntu-latest
    if: vars.LINEAR_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Check Linear setup
        id: linear_setup
        run: |
          if [ ! -f linear/config.json ]; then
            echo "::notice::Skipping Linear sync because linear/config.json is missing. Run linear/setup_linear.py and commit linear/config.json."
            echo "config_ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "config_ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync to Linear
        if: steps.linear_setup.outputs.config_ready == 'true'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: python linear/sync.py ${{ github.event.inputs.mode || 'sync' }}
