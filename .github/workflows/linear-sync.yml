name: Linear Sync

on:
  issues:
    types: [opened, edited, closed, reopened]
  pull_request:
    types: [opened, edited, closed, reopened, converted_to_draft, ready_for_review]

concurrency:
  group: linear-sync-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  call:
    uses: ./.github/workflows/_linear-sync.yml
    secrets: inherit
    with:
      link_back: true
