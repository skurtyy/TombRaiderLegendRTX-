name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: |
            This issue has been inactive for 30 days and will be closed in 14 days unless there is new activity.
          stale-pr-message: |
            This PR has been inactive for 30 days and will be closed in 14 days unless there is new activity.
          exempt-issue-labels: 'pinned,blocker,in-progress,do-not-close'
          exempt-pr-labels: 'pinned,in-progress,do-not-close'
