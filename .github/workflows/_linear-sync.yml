name: Reusable - GitHub-Linear Sync

on:
  workflow_call:
    inputs:
      link_back:
        description: Post a comment linking the GitHub issue/PR to its Linear counterpart
        required: false
        type: boolean
        default: true
    secrets:
      LINEAR_API_KEY:
        required: false
      LINEAR_TEAM_ID:
        required: false

jobs:
  sync-to-linear:
    runs-on: ubuntu-latest
    if: github.event.action != 'deleted'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Sync to Linear
        uses: actions/github-script@v7
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
          LINK_BACK: ${{ inputs.link_back }}
        with:
          script: |
            const apiKey = process.env.LINEAR_API_KEY;
            const teamId = process.env.LINEAR_TEAM_ID;
            const linkBack = process.env.LINK_BACK === 'true';

            if (!apiKey || !teamId) {
              console.log('Linear API key or team id not configured, skipping');
              return;
            }

            const issue = context.payload.issue || context.payload.pull_request;
            const repo = context.repo;
            const isPR = !!context.payload.pull_request;
            if (!issue) { console.log('No issue or PR in payload, skipping'); return; }
            const itemType = isPR ? 'PR' : 'Issue';

            function escapeGraphQL(str) {
              if (!str) return '';
              return str.replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\n/g,'\\n').replace(/\r/g,'\\r').replace(/\t/g,'\\t');
            }
            async function linear(query) {
              const r = await fetch('https://api.linear.app/graphql', {
                method: 'POST',
                headers: {'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
                body: JSON.stringify({query})
              });
              if (!r.ok) throw new Error(`Linear API ${r.status}`);
              return await r.json();
            }

            const title = `[${repo.repo}] ${itemType}#${issue.number}: ${issue.title}`;
            const description = `${issue.body || '(no description)'}\n\n---\n[GitHub Link](${issue.html_url})`;

            try {
              const search = await linear(`query{issues(filter:{description:{contains:"${issue.html_url}"}},first:1){nodes{id identifier}}}`);
              const existing = search.data?.issues?.nodes?.[0];
              if (existing) {
                const upd = await linear(`mutation{issueUpdate(id:"${existing.id}",input:{title:"${escapeGraphQL(title)}",description:"${escapeGraphQL(description)}"}){issue{id identifier}}}`);
                console.log(`Updated Linear ${upd.data?.issueUpdate?.issue?.identifier || 'failed'}`);
              } else {
                const cre = await linear(`mutation{issueCreate(input:{teamId:"${teamId}",title:"${escapeGraphQL(title)}",description:"${escapeGraphQL(description)}"}){issue{id identifier url}}}`);
                const created = cre.data?.issueCreate?.issue;
                if (created && linkBack) {
                  await github.rest.issues.createComment({
                    owner: repo.owner, repo: repo.repo, issue_number: issue.number,
                    body: `Synced to Linear: [${created.identifier}](${created.url})`
                  });
                }
                console.log(`Created Linear ${created?.identifier || 'failed'}`);
              }
            } catch (e) { console.log('Sync skipped:', e.message); }
