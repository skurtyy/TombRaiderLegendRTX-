name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check if dependency review is supported
        id: check_support
        run: |
          if ! gh api /repos/${{ github.repository }}/dependency-graph/sbom > /dev/null 2>&1; then
            echo "supported=false" >> $GITHUB_OUTPUT
            echo "Dependency graph is not enabled. Skipping review."
          else
            echo "supported=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dependency Review
        if: steps.check_support.outputs.supported == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
