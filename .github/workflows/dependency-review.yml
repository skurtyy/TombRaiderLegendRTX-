name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Dependency Review
        uses: actions/dependency-review-action@v4.4.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
